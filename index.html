<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC Bridge</title>
  <meta name="description" content="BTC Bridge helps you move Bitcoin to and from other chains as wrapped BTC from your own wallet.">

  <meta name="twitter:card" content="summary">

  <meta name="twitter:description" content="BTC Bridge helps you move Bitcoin to and from other chains as wrapped BTC from your own wallet.">

  <link rel="manifest" href="site.webmanifest">
  <style>
:root {
  --bg: #080806;
  --panel: #11100d;
  --panel-strong: #171510;
  --ink: #f7931a; /* Adjusted to Bitcoin Orange for title highlights */
  --ink-body: #f7f1e8;
  --muted: #b4aea5;
  --faint: #787168;
  --line: rgba(247, 241, 232, 0.13);
  --line-strong: rgba(247, 241, 232, 0.22);
  --accent: #f7931a;
  --accent-soft: rgba(247, 147, 26, 0.14);
  --shadow: 0 34px 80px -48px rgba(0, 0, 0, 0.95);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  min-height: 100dvh;
  margin: 0;
  overflow-y: auto; /* Allow scroll on satellites */
  color: var(--ink-body);
  background:
    radial-gradient(circle at 50% 0%, rgba(247, 147, 26, 0.15), transparent 34rem),
    linear-gradient(180deg, #0d0b08 0%, var(--bg) 54%, #050504 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

a {
  color: var(--accent);
  text-decoration: none;
  transition: color 160ms ease;
}

a:hover {
  color: var(--ink-body);
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 18px;
  min-height: 70px;
  padding: 18px clamp(18px, 4vw, 44px);
  border-bottom: 1px solid var(--line);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1.02rem;
  font-weight: 750;
  letter-spacing: 0;
  white-space: nowrap;
  color: var(--ink-body);
}

.brand img {
  flex: 0 0 auto;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(247, 147, 26, 0.25);
}

.nav {
  display: flex;
  align-items: center;
  gap: clamp(16px, 2.4vw, 28px);
  margin-left: 6px;
}

.nav a {
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 600;
  white-space: nowrap;
  transition: color 160ms ease;
}

.nav a:hover, .nav a.active {
  color: var(--accent);
}

.spacer {
  flex: 1 1 auto;
}

.open-app {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 18px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  color: var(--ink-body);
  background: rgba(247, 241, 232, 0.045);
  font-size: 0.9rem;
  font-weight: 700;
  white-space: nowrap;
  transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
}

.open-app:hover {
  border-color: rgba(247, 147, 26, 0.55);
  background: var(--accent-soft);
  transform: translateY(-1px);
}

.stage {
  flex: 1 1 auto;
  min-height: 0;
  width: min(100%, 1120px);
  margin: 0 auto;
  padding: clamp(12px, 2.5vh, 28px) clamp(18px, 4vw, 44px) clamp(10px, 2vh, 22px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero {
  display: contents;
}

h1 {
  margin: 0;
  font-size: clamp(3.15rem, 7vw, 5.1rem);
  line-height: 0.98;
  letter-spacing: 0;
  font-weight: 820;
  color: var(--ink-body);
}

.value {
  width: min(100%, 50rem);
  margin: 18px auto 0;
  color: var(--muted);
  font-size: clamp(1rem, 1.8vw, 1.19rem);
}

.value strong {
  color: var(--ink-body);
  font-weight: 780;
  box-shadow: inset 0 -0.45em 0 var(--accent-soft);
}

.app-card {
  width: min(100%, 590px);
  margin-top: clamp(26px, 4vh, 38px);
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(247, 241, 232, 0.055), rgba(247, 241, 232, 0.018)),
    var(--panel);
  box-shadow: var(--shadow);
}

.route {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.leg {
  flex: 1 1 0;
  min-width: 0;
  padding: 15px 16px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--panel-strong);
  text-align: left;
}

.label {
  display: block;
  color: var(--faint);
  font-size: 0.71rem;
  font-weight: 760;
  letter-spacing: 0.08em;
  line-height: 1;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  margin-top: 11px;
  color: var(--ink-body);
  font-size: 1.11rem;
  font-weight: 820;
  line-height: 1.2;
}

.chip img {
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  border-radius: 50%;
}

.chip span {
  overflow-wrap: anywhere;
}

.switch {
  flex: 0 0 auto;
  align-self: center;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  color: var(--accent);
  background: #0b0a08;
  cursor: pointer;
  display: grid;
  place-items: center;
  font: inherit;
  font-weight: 820;
  line-height: 1;
  transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
}

.switch:hover {
  border-color: rgba(247, 147, 26, 0.62);
  background: var(--accent-soft);
  transform: translateY(-1px);
}

.enter-app {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 54px;
  margin-top: 16px;
  border-radius: 16px;
  color: #150d04;
  background: var(--accent);
  font-size: 1.05rem;
  font-weight: 830;
  transition: background 160ms ease, transform 160ms ease;
}

.enter-app:hover {
  background: var(--accent);
  transform: translateY(-1px);
}

.note {
  margin: 11px 0 0;
  color: var(--faint);
  font-size: 0.8rem;
  font-weight: 560;
}

.footer {
  flex: 0 0 auto;
  padding: 16px 24px 22px;
  color: var(--faint);
  font-size: 0.84rem;
  font-weight: 560;
  text-align: center;
  border-top: 1px solid var(--line);
}

/* Satellite Layout */
.satellite-container {
  max-width: 760px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  width: 100%;
}

.breadcrumb {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb a {
  color: var(--muted);
}

.breadcrumb a:hover {
  color: var(--accent);
}

.satellite-title {
  font-size: clamp(2rem, 5vw, 2.75rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 20px;
  color: var(--ink-body);
}

.satellite-lead {
  font-size: 1.1rem;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 40px;
}

.satellite-lead strong {
  color: var(--ink-body);
}

.section-block {
  margin-bottom: 40px;
}

.section-block h2 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  color: var(--ink-body);
  border-bottom: 1px solid var(--line);
  padding-bottom: 8px;
}

.section-block h3 {
  font-size: 1.15rem;
  font-weight: 600;
  margin: 24px 0 10px;
  color: var(--ink-body);
}

.section-block p {
  color: var(--muted);
  margin-bottom: 16px;
  line-height: 1.7;
}

.section-block p strong {
  color: var(--ink-body);
}

.section-block ul, .section-block ol {
  margin: 16px 0;
  padding-left: 24px;
  color: var(--muted);
}

.section-block li {
  margin-bottom: 8px;
  line-height: 1.6;
}

.section-block li strong {
  color: var(--ink-body);
}

/* Info Grid Cards */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin: 24px 0;
}

.info-card {
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background-color: var(--panel);
}

.info-card h4 {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--ink-body);
}

.info-card p {
  font-size: 0.875rem;
  color: var(--muted);
  margin: 0;
  line-height: 1.5;
}

/* Tables */
.table-wrapper {
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid var(--line);
  background-color: var(--panel);
  margin: 24px 0;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
  text-align: left;
}

.data-table th {
  padding: 14px 18px;
  background-color: var(--panel-strong);
  color: var(--ink-body);
  font-weight: 700;
  border-bottom: 1px solid var(--line);
}

.data-table td {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
}

.data-table tr:last-child td {
  border-bottom: 0;
}

.data-table tr:hover td {
  color: var(--ink-body);
  background-color: rgba(247, 241, 232, 0.02);
}

.highlight-cell {
  color: var(--accent);
  font-weight: 600;
}

/* Accordion details/summary for FAQ Page */
.faq-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 24px 0;
}

.faq-item {
  border: 1px solid var(--line);
  border-radius: 12px;
  background-color: var(--panel);
  overflow: hidden;
  transition: border-color 0.2s ease;
}

.faq-item[open] {
  border-color: var(--line-strong);
}

.faq-item summary {
  padding: 18px 24px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  list-style: none;
  color: var(--ink-body);
}

.faq-item summary::-webkit-details-marker {
  display: none;
}

.faq-item summary::after {
  content: "+";
  font-size: 1.25rem;
  color: var(--muted);
  transition: transform 0.2s ease;
}

.faq-item[open] summary::after {
  transform: rotate(45deg);
  color: var(--accent);
}

.faq-item summary:hover {
  background-color: rgba(247, 241, 232, 0.02);
}

.faq-content {
  padding: 0 24px 20px;
  font-size: 0.925rem;
  color: var(--muted);
  line-height: 1.6;
}

/* Back Link Button */
.back-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 40px;
  padding: 12px 24px;
  background-color: var(--panel);
  border: 1px solid var(--line);
  border-radius: 9999px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--ink-body);
  transition: all 0.2s ease;
}

.back-cta:hover {
  border-color: var(--line-strong);
  background-color: var(--panel-strong);
  color: var(--accent);
}

/* Camouflaged Links (blend in for EEAT, fully crawlable) */
a.inline {
  color: inherit;
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px dashed rgba(247, 241, 232, 0.3);
  cursor: pointer;
  transition: all 0.2s ease;
}

a.inline:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

@media (max-width: 700px) {
  .topbar {
    min-height: 62px;
    gap: 12px;
    padding: 14px 16px;
  }

  .nav {
    display: none;
  }

  .open-app {
    min-height: 38px;
    padding: 0 14px;
  }

  .stage {
    padding: 10px 16px 8px;
    overflow-y: auto;
  }

  body {
    overflow: auto; /* Allow scrolling on mobile body if content flows */
  }

  h1 {
    font-size: clamp(2.55rem, 13vw, 3.25rem);
  }

  .value {
    margin-top: 14px;
    font-size: 0.98rem;
    line-height: 1.45;
  }

  .app-card {
    margin-top: 24px;
    padding: 16px;
    border-radius: 19px;
  }

  .route {
    flex-direction: column;
    gap: 10px;
  }

  .leg {
    padding: 13px 14px;
  }

  .switch {
    width: 38px;
    height: 38px;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .enter-app {
    min-height: 50px;
    margin-top: 14px;
  }

  .footer {
    padding: 12px 18px 16px;
  }
}

@media (max-width: 390px) and (max-height: 820px) {
  .topbar {
    min-height: 58px;
    padding-top: 11px;
    padding-bottom: 11px;
  }

  .brand {
    font-size: 0.96rem;
  }

  .brand img {
    width: 28px;
    height: 28px;
  }

  .open-app {
    min-height: 36px;
    padding: 0 12px;
    font-size: 0.86rem;
  }

  .stage {
    padding-top: 6px;
  }

  h1 {
    font-size: 2.6rem;
  }

  .value {
    margin-top: 12px;
    font-size: 0.94rem;
  }

  .app-card {
    margin-top: 18px;
    padding: 14px;
  }

  .leg {
    padding: 12px 13px;
  }

  .chip {
    margin-top: 9px;
    font-size: 1.02rem;
  }

  .enter-app {
    min-height: 48px;
  }

  .note {
    margin-top: 9px;
  }

  .footer {
    padding-top: 9px;
    padding-bottom: 12px;
  }
}

<body>
  <header class="topbar">
    <a class="brand" href="." aria-label="BTC Bridge">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>BTC Bridge</span>
    </a>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/" class="">How it works</a>
      <a href="faq/" class="">FAQ</a>
      <a href="about/" class="">About</a>
      <a href="security/" class="">Security</a>
      <a href="supported-chains/" class="">Supported Chains</a>
    </nav>
    <span class="spacer"></span>
    <a class="open-app" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">BTC Bridge</h1>
      <p class="value"><strong>BTC Bridge</strong> helps you move Bitcoin to and from other chains as wrapped BTC from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Bridge preview">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="btc.png" width="28" height="28" alt="BTC">
            <span>BTC</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">-&gt;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="wbtc.png" width="28" height="28" alt="WBTC">
            <span>WBTC</span>
          </span>
        </div>
      </div>
      <a class="enter-app" href="dashboard/" rel="noopener noreferrer">Enter App</a>
      <p class="note">Preview only</p>
    </section>
  </main>

  <footer class="footer">BTC Bridge &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";

    var button = document.querySelector("[data-switch]");
    var chips = document.querySelectorAll(".chip");

    if (!button || chips.length < 2) {
      return;
    }

    button.addEventListener("click", function () {
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
